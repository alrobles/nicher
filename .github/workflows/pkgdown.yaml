- uses: r-lib/actions/setup-r@v2
  with:
    use-public-rspm: true

# Add this step to install the missing 'pak' package
- name: Install pak
  run: |
    install.packages("pak", repos = "https://cloud.r-project.org/")
  shell: Rscript {0}

# Install the GitHub dependency before setting up other dependencies
- name: Install GitHub dependency
  run: |
    pak::pkg_install("alrobles/ucminfcpp")
  shell: Rscript {0}
